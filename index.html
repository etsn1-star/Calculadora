<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="style.css" />
    <title>Calculadora Moderna</title>
  </head>
  <body>
    <div class="visor">
      <h1>texto</h1>
    </div>
    <div class="flex-container">
      <div class="botoes">
        <button>0</button>

        <button>1</button>
        <button>2</button>
        <button>3</button>

        <button>4</button>
        <button>5</button>
        <button>6</button>

        <button>7</button>
        <button>8</button>
        <button class="botao9">9</button>
      </div>

      <div class="operadores">
        <button>+</button>
        <button>-</button>
        <button>*</button>
        <button>/</button>
        <button>=</button>
        <button>DEL</button>
      </div>
    </div>
  </body>
</html>
